<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>HTML & CSS Sandbox - Lists</h1>
  </body>
  <!-- Unorder List -->
  <ul>
    <li>Item One</li>
    <li>Item Two</li>
    <li>Item Three</li>
  </ul>

  <!-- Ordered List -->
  <ol>Item One</ol>
  <ol>Item Two</ol>
  <ol>Item Three</ol>

  <!-- Nested List -->
  <ul>
    <li>Item One</li>
    <li>Item Two</li>
    <li>Item Three
      <ul>
        <li>One</li>
        <li>Two</li>
      </ul>
    </li>
  </ul>

  <!-- Definition List -->
  <dl>
    <dt>Item 1</dt>
    <dd>Description 1</dd>
    <dt>Item 2</dt>
    <dd>Description 2</dd>
    <dt>Item 3</dt>
    <dd>Description 3</dd>
  </dl>
</html>
